{% extends 'album/base.html' %}

{% block content %}
<div class="delete-wrapper">
    <div class="delete-card">
        <div class="icon-warning">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18"></path>
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        </div>

        <header class="delete-header">
            <h1>Törlés megerősítése</h1>
            <p>Biztosan törölni szeretnéd a következő elemet? <br>
               <strong class="item-name">"{{ photo.name }}"</strong>
            </p>
        </header>

        <div class="alert-info">
            Ez a művelet nem vonható vissza, a fájl véglegesen elvész.
        </div>

        <form method="post" class="delete-actions">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Igen, végleges törlés</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Mégsem</a>
        </form>
    </div>
</div>

<style>
    .delete-wrapper {
        display: flex;
        justify-content: center;
        padding-top: 3rem;
    }

    .delete-card {
        background: white;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        max-width: 500px;
        text-align: center;
        border: 1px solid #fee2e2;
    }

    .icon-warning {
        margin-bottom: 1.5rem;
    }

    .delete-header h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        color: #1e293b;
    }

    .item-name {
        color: #ef4444;
        font-size: 1.1rem;
    }

    .alert-info {
        background: #fff1f2;
        color: #991b1b;
        padding: 10px;
        border-radius: 6px;
        font-size: 0.85rem;
        margin: 1.5rem 0;
    }

    .delete-actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
    }

    .btn-secondary {
        background: #f1f5f9;
        color: #475569 !important;
    }

    .btn-secondary:hover {
        background: #e2e8f0;
    }
</style>
{% endblock %}
